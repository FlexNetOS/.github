name: ci

# Umbrella self-CI. Calls the reusable workflows defined in this repo so
# they're exercised on every change (eat your own dog food).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Block default permissions; callers re-grant minimally.
permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml
    with:
      language: mixed
    secrets: inherit

  manifest-validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate repo manifest
        run: python3 scripts/verify-manifest.py repos/MANIFEST.yaml
      - name: Validate tool manifest
        run: python3 scripts/verify-manifest.py tools/MANIFEST.yaml

  actionlint:
    name: actionlint .github/workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2
        with:
          files: '.github/workflows/*.yml'
          fail-on-error: true

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/verify-markdown.py .

  hermetic-audit:
    name: Hermetic dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/hermetic-audit.py .

  security:
    needs: lint
    uses: ./.github/workflows/reusable-security.yml
    with:
      languages: 'actions'
      fail-on-severity: high
    secrets: inherit
    permissions:
      actions: read
      contents: read
      security-events: write
