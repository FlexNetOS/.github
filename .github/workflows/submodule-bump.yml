name: submodule-bump

# Weekly: opens a PR with submodule pointers fast-forwarded to tracked HEAD.
# Calls reusable-submodule-bump.yml.

on:
  schedule:
    - cron: '0 14 * * 1'      # Monday 14:00 UTC
  workflow_dispatch:
    inputs:
      group:
        description: 'MANIFEST group to bump (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: ./.github/workflows/reusable-submodule-bump.yml
    with:
      group: ${{ inputs.group || '' }}
      pr-title: chore(submodules) weekly bump
    permissions:
      contents: write
      pull-requests: write
